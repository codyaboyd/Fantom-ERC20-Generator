<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenCore Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #eef2fb;
            --surface: #e8edf9;
            --text: #1f2e57;
            --accent: #7389ff;
            --cyan: #71e6ff;
            --shadow-dark: #c4cee5;
            --shadow-light: #ffffff;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            background: radial-gradient(circle at 5% 0%, #dff4ff 0%, #ecf0ff 45%, #eaf6ff 100%);
            font-family: "Inter", "Segoe UI", sans-serif;
            padding: 24px 12px 40px;
        }

        .admin-shell {
            max-width: 940px;
            border-radius: 24px;
            padding: 1.2rem;
            background: var(--surface);
            box-shadow: 12px 12px 26px var(--shadow-dark), -12px -12px 26px var(--shadow-light);
        }

        .panel-title {
            font-weight: 800;
            margin: 0;
        }

        .soft-card {
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.9rem;
            background: #ecf1ff;
            box-shadow: inset 4px 4px 10px var(--shadow-dark), inset -4px -4px 10px var(--shadow-light);
        }

        .form-control {
            border: none;
            border-radius: 12px;
            background: #f1f5ff;
            color: var(--text);
            box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light);
        }

        .form-control:focus {
            background: #f8f9ff;
            box-shadow: inset 2px 2px 5px #bec9e2, inset -2px -2px 5px #ffffff, 0 0 0 0.2rem rgba(115, 137, 255, 0.24);
            color: var(--text);
        }

        .btn-neo {
            border: none;
            border-radius: 12px;
            font-weight: 700;
            padding: 0.55rem 1rem;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), #5c74ec);
            box-shadow: 5px 5px 12px #b2bfdc, -5px -5px 12px #ffffff;
        }

        .btn-connect {
            background: linear-gradient(135deg, var(--cyan), #6ab0ff);
        }

        #priceDisplay,
        #contractBalance,
        #status {
            border-radius: 12px;
            min-height: 40px;
            padding: 0.6rem 0.75rem;
            background: #f2f5ff;
            box-shadow: inset 3px 3px 8px #cad2e8, inset -3px -3px 8px #ffffff;
        }

        .subtle {
            color: #5d6b95;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
<div class="container admin-shell">
    <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
        <div>
            <h1 class="panel-title">GenCore Admin Panel</h1>
            <div class="subtle">Manage pricing, withdrawals, and ownership in one place.</div>
        </div>
        <button id="connectWallet" class="btn btn-neo btn-connect">Connect MetaMask</button>
    </div>

    <div class="soft-card">
        <label for="newOwner" class="form-label">Transfer Ownership</label>
        <input type="text" class="form-control" id="newOwner" placeholder="New owner address">
        <button id="transferOwnership" class="btn btn-neo mt-2">Transfer</button>
    </div>

    <div class="soft-card">
        <label for="checkServiceName" class="form-label">Check Price for Service</label>
        <input type="text" class="form-control" id="checkServiceName" placeholder="Service key">
        <button id="checkPrice" class="btn btn-neo mt-2">Check Price</button>
        <div id="priceDisplay" class="mt-3"></div>
    </div>

    <div class="soft-card">
        <label for="serviceName" class="form-label">Service Name</label>
        <input type="text" class="form-control" id="serviceName" placeholder="wizard">
        <label for="servicePrice" class="form-label mt-2">Price (in Wei)</label>
        <input type="number" class="form-control" id="servicePrice" placeholder="1000000000000000000">
        <button id="setPrice" class="btn btn-neo mt-2">Set Price</button>
    </div>

    <div class="soft-card">
        <label for="withdrawAmount" class="form-label">Withdraw Amount (in Wei)</label>
        <input type="number" class="form-control" id="withdrawAmount" placeholder="0">
        <button id="withdrawEth" class="btn btn-neo mt-2">Withdraw ETH</button>
    </div>

    <div class="soft-card">
        <label for="tokenAddress" class="form-label">Token Address</label>
        <input type="text" class="form-control" id="tokenAddress" placeholder="ERC20 contract address">
        <button id="withdrawTokens" class="btn btn-neo mt-2">Withdraw Tokens</button>
    </div>

    <div class="soft-card">
        <button id="checkBalance" class="btn btn-neo mt-1">Check Contract Balance</button>
        <div id="contractBalance" class="mt-3"></div>
    </div>

    <div id="status" class="mt-3"></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
<script src="./data.js"></script>
<script src="./app.js"></script>
</body>
</html>
